# Version-driven release tagging: bump VERSION on main and the release-tag
# job creates the matching git tag. Tags are never created by hand.
include:
  - project: eiseron/stack/ci
    file: /templates/release.yml
    ref: v0.1.2

stages:
  - test
  - sync
  - release

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

default:
  tags:
    - self-hosted

smoke-test:
  stage: test
  image: debian:stable-slim
  script:
    - bash -n bootstrap.sh
    - bash test/smoke.sh

sync-github:
  stage: sync
  image: alpine:3.21
  before_script:
    - apk add --no-cache git
  cache: []
  variables:
    GIT_DEPTH: "0"
  script:
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/eiseron/bootstrap.git"
    - git push github HEAD:refs/heads/main --tags
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
